set -ga terminal-overrides ",xterm-256color*:Tc"
unbind C-b
set -g prefix C-s
bind-key C-s send-prefix

# Sensible defaults (inlined from tmux-plugins/tmux-sensible — no plugin manager).
set -s escape-time 0        # no delay leaving insert mode in nvim
set -g focus-events on      # let nvim autoread react to focus changes
set -g display-time 4000    # show status messages for 4s, not 750ms
set -g status-keys emacs    # emacs keys in the command prompt
setw -g aggressive-resize on

# Style
set -g status-interval 3     # update the status bar every 3 seconds
set -g status-position top

set-option -g mouse on
set-window-option -g mode-keys vi
# Reload settings
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# start window number on 1
set -g base-index 1
# Moving window
bind-key S-Left swap-window -t -1 \; previous-window
bind-key S-Right swap-window -t +1 \; next-window

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Seamless nav between nvim splits and tmux panes (inlined from
# christoomey/vim-tmux-navigator — pairs with the nvim plugin of the same name).
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# split pane and windows in current path:
bind-key _ split-window -v -c '#{pane_current_path}'
bind-key - split-window -h -c '#{pane_current_path}'
bind-key c new-window -c '#{pane_current_path}'

# Pane resize
bind-key -r K resize-pane -U 5
bind-key -r J resize-pane -D 5
bind-key -r H resize-pane -L 15
bind-key -r L resize-pane -R 15

# C-j for fuzzy finder of tmux sessions
# this one works for bash
# bind C-j split-window -v "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
# this one works for fish
bind C-j display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\\\$\" | fzf --reverse | xargs tmux switch-client -t"

# C-f for worktree switcher with session management and creation
bind-key C-f display-popup -w 80% -h 80% -E "tmux-sessionizer"

# C-w for worktree switcher with session management and creation
bind-key C-w display-popup -E "tmux-worktree-switcher"

# Rename current window to the current current directory
bind-key C-n run-shell "tmux rename-window \"$(basename #{pane_current_path} | cut -c-10)\""

set-option -g history-limit 64096


# allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#T"


# Catppuccin theme. install.sh clones it into ~/.config/tmux/plugins/catppuccin/tmux
# pinned to an immutable commit SHA. No plugin manager (tpm): tmux-sensible and
# vim-tmux-navigator are inlined above instead of fetched, so this config runs only
# code we vendored or pinned.
set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_number_color "#{@thm_flamingo}"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
set -g status-left-length 100
set -g status-left ""
set -ag status-left "#{E:@catppuccin_status_session}#[bg=default] "
set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_date_time}"
