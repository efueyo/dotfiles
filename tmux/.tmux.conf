set -ga terminal-overrides ",xterm-256color*:Tc"
unbind C-b
set -g prefix C-s
bind-key C-s send-prefix

# Style
set -g status-interval 3     # update the status bar every 3 seconds
set -g status-position top

set-option -g mouse on
set-window-option -g mode-keys vi
# Reload settings
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# start window number on 1
set -g base-index 1
# Moving window
bind-key S-Left swap-window -t -1 \; previous-window
bind-key S-Right swap-window -t +1 \; next-window

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# split pane and windows in current path:
bind-key _ split-window -v -c '#{pane_current_path}'
bind-key - split-window -h -c '#{pane_current_path}'
bind-key c new-window -c '#{pane_current_path}'

# Pane resize
bind-key -r K resize-pane -U 5
bind-key -r J resize-pane -D 5
bind-key -r H resize-pane -L 15
bind-key -r L resize-pane -R 15

# C-j for fuzzy finder of tmux sessions
# this one works for bash
# bind C-j split-window -v "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
# this one works for fish
bind C-j display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\\\$\" | fzf --reverse | xargs tmux switch-client -t"

# C-f for worktree switcher with session management and creation
bind-key C-f display-popup -w 80% -h 80% -E "tmux-sessionizer"

# C-w for worktree switcher with session management and creation
bind-key C-w display-popup -E "tmux-worktree-switcher"

# Rename current window to the current current directory
bind-key C-n run-shell "tmux rename-window \"$(basename #{pane_current_path} | cut -c-10)\""

set-option -g history-limit 64096


# allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#T"


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Run
# mkdir -p ~/.config/tmux/plugins/catppuccin
# git clone -b v2.1.3 https://github.com/catppuccin/tmux.git ~/.config/tmux/plugins/catppuccin/tmux

set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_number_color "#{@thm_flamingo}"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
set -g status-left-length 100
set -g status-left ""
set -ag status-left "#{E:@catppuccin_status_session}#[bg=default] "
set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
