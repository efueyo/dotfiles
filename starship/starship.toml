
[kubernetes]
disabled = false
[[kubernetes.contexts]]
context_pattern = "arn.*/(?P<var_cluster>[\\w-]+)"
context_alias = "$var_cluster"
[terraform]
disabled = true
[gcloud]
disabled = true
[aws]
format="on [$symbol\\[$profile\\]]($style)"
# symbol='☁️'
symbol=' '
[git_branch]
truncation_length = 20
[shell]
fish_indicator = '󰈺 '
bash_indicator = '󱆃'
unknown_indicator = 'mystery shell'
style = 'cyan bold'
disabled = false
